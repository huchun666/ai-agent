services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: aiagent
      POSTGRES_PASSWORD: aiagent
      POSTGRES_DB: aiagent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiagent -d aiagent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
